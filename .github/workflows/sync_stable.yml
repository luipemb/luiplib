name: Sync All Stable Files

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install Lua
        run: sudo apt-get install -y lua5.1

      - name: Sync Stable Versions
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git checkout main

          for file in *; do
            [ -f "$file" ] || continue
            [[ "$file" == *S ]] && continue
            [[ "$file" == *"."* ]] && continue # Ignora arquivos com extensão como .yaml ou .lua

            echo "Checking file: $file"
            
            if ! luac -p "$file"; then
              echo "  -> [SKIPED] $file doesn't seems like a valid script."
              continue
            fi

            VERSION=$(grep -oP 'vers\s*=\s*"\K[^"]+' "$file" | tr -d ' ' || true)
            
            if [ -z "$VERSION" ]; then
              echo "  -> [SKIPED] Variable 'vers' not founded in $file."
              continue
            fi

            echo "  -> Version detected: '$VERSION'"

            if [[ ! "$VERSION" =~ "ex" ]]; then
              STABLE_NAME="${file}S"
              
              echo "  -> [STABLE] copying $file to $STABLE_NAME"
              cp -f "$file" "$STABLE_NAME"
              git add "$STABLE_NAME"
            else
              echo "  -> [EXP] $VERSION is experimental. Ignoring."
            fi
          done

          if ! git diff --cached --quiet; then
            echo "Detected changes. Starting push..."
            git commit -m "Auto-sync: optlibS updated to $VERSION"
            git push origin main
          else
            echo "No change. The content hasn't changed."
          fi
