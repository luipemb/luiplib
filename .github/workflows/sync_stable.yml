name: Sync All Stable Files

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install Lua
        run: sudo apt-get install -y lua5.1

      - name: Sync Stable Versions
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git checkout main

          # Agora procuramos arquivos que NÃO terminam com 'S' e não têm extensão
          # Isso vai pegar o seu 'optlib'
          for file in *; do
            # Pula se for diretório ou se o arquivo terminar com 'S' (para não ler o optlibS)
            [ -f "$file" ] || continue
            [[ "$file" == *S ]] && continue
            [[ "$file" == *"."* ]] && continue # Ignora arquivos com extensão como .yaml ou .lua

            echo "Analisando arquivo: $file"
            
            # Tenta validar como Lua mesmo sem extensão
            if ! luac -p "$file"; then
              echo "  -> [PULADO] $file não parece ser um script Lua válido."
              continue
            fi

            # Pega a versão dentro do arquivo
            VERSION=$(grep -oP 'vers\s*=\s*"\K[^"]+' "$file" | tr -d ' ' || true)
            
            if [ -z "$VERSION" ]; then
              echo "  -> [PULADO] Variável 'vers' não encontrada em $file."
              continue
            fi

            echo "  -> Versão encontrada: '$VERSION'"

            # Se não for experimental, sincroniza
            if [[ ! "$VERSION" =~ "ex" ]]; then
              STABLE_NAME="${file}S"
              
              echo "  -> [STABLE] Copiando $file para $STABLE_NAME"
              cp -f "$file" "$STABLE_NAME"
              git add "$STABLE_NAME"
            else
              echo "  -> [BETA] $VERSION é experimental. Ignorando."
            fi
          done

          if ! git diff --cached --quiet; then
            echo "Mudanças detectadas. Realizando push..."
            git commit -m "Auto-sync: optlibS atualizado para $VERSION"
            git push origin main
          else
            echo "Nenhuma mudança detectada. O conteúdo de optlibS já é idêntico ao optlib."
          fi
